<!DOCTYPE html>
<html lang="pt-BR" 
      layout:decorate="~{layout/layoutpadrao}" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8" />
    <title>Pesquisar Leilões</title>
</head>
<body>

    <main layout:fragment="conteudo" id="main" class="container mx-auto p-6 max-w-5xl">
        
        <div th:fragment="formulario" id="search-container" class="space-y-6">
            
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Pesquisar Leilões</h1>
                <p class="text-sm text-gray-500">Utilize os filtros abaixo para encontrar leilões específicos.</p>
            </div>

            <form hx-post="/leilao/pesquisar" 
                  hx-target="#search-container" 
                  hx-swap="outerHTML"
                  class="bg-white shadow-md rounded-lg p-6 border border-gray-200 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="nome">
                        Nome do Leilão
                    </label>
                    <input type="text" 
                           id="nome" 
                           name="nome"
                           th:value="${leilao?.nome}"
                           placeholder="Ex: Nelore, Angus..."
                           class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="status">
                        Status do Leilão
                    </label>
                    <select id="status" 
                            name="status"
                            class="block appearance-none w-full bg-white border border-gray-400 hover:border-gray-500 px-4 py-2 pr-8 rounded shadow leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Todos os Status</option>
                        <option th:each="statusEnum : ${T(com.example.model.StatusLeilao).values()}" 
                                th:value="${statusEnum}" 
                                th:text="${statusEnum.descricao}"
                                th:selected="${leilao?.status == statusEnum}">Status</option>
                    </select>
                </div>

                <div>
                    <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition duration-200 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        Filtrar
                    </button>
                </div>
            </form>

            <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 text-left text-sm text-gray-600">
                        <thead class="bg-gray-50 text-xs uppercase font-semibold text-gray-700 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-4">ID</th>
                                <th class="px-6 py-4">Nome do Evento</th>
                                <th class="px-6 py-4">Preço Inicial</th>
                                <th class="px-6 py-4 text-center">Status</th>
                                <th class="px-6 py-4 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 bg-white">
                            <tr th:each="l : ${leiloesFiltrados}" class="hover:bg-gray-50 transition duration-150">
                                <td class="px-6 py-4 font-medium text-gray-900" th:text="${l.id}">1</td>
                                <td class="px-6 py-4 font-semibold text-gray-800" th:text="${l.nome}">Leilão Nelore</td>
                                <td class="px-6 py-4 text-gray-700" th:text="'R$ ' + ${#numbers.formatDecimal(l.initialPrice, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</td>
                                <td class="px-6 py-4 text-center whitespace-nowrap">
                                    <span th:if="${l.status.name() == 'AGUARDANDO'}" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-yellow-100 text-yellow-800" th:text="${l.status.descricao}">Aguardando</span>
                                    <span th:if="${l.status.name() == 'ABERTO'}" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800" th:text="${l.status.descricao}">Aberto</span>
                                    <span th:if="${l.status.name() == 'ENCERRADO'}" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800" th:text="${l.status.descricao}">Encerrado</span>
                                </td>
                                <td class="px-6 py-4 text-center whitespace-nowrap text-sm font-medium">
                                    <button hx-get="/leilao/mostrar/" th:attrappend="hx-get=${l.id}"
                                            hx-target="#main" 
                                            class="text-blue-600 hover:text-blue-900 font-semibold transition duration-150">
                                        Visualizar
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(leiloesFiltrados)}">
                                <td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">
                                    Use os filtros acima para realizar uma busca ou nenhum leilão corresponde aos critérios.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </div>

    </main>

</body>
</html>
