<!DOCTYPE html>
<html lang="pt-BR" 
      layout:decorate="~{layout/layoutpadrao}" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8" />
    <title>Listagem de Leilões</title>
</head>
<body>

    <main layout:fragment="conteudo" id="main" class="container mx-auto p-6 max-w-5xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Leilões Cadastrados</h1>
                <p class="text-sm text-gray-500">Gerencie os eventos e acompanhe os lances em tempo real.</p>
            </div>
            <a hx-get="/leilao/cadastrar" 
               hx-target="#main" 
               class="cursor-pointer bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition duration-200 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Novo Leilão
            </a>
        </div>

        <div th:fragment="listagem" class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-left text-sm text-gray-600">
                    <thead class="bg-gray-50 text-xs uppercase font-semibold text-gray-700 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">Nome do Evento</th>
                            <th class="px-6 py-4">Preço Inicial</th>
                            <th class="px-6 py-4">Encerramento</th>
                            <th class="px-6 py-4 text-center">Status</th>
                            <th class="px-6 py-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200 bg-white">
                        <tr th:each="leilao : ${leiloes}" class="hover:bg-gray-50 transition duration-150">
                            <td class="px-6 py-4 font-medium text-gray-900" th:text="${leilao.id}">1</td>
                            <td class="px-6 py-4 font-semibold text-gray-800" th:text="${leilao.nome}">Leilão Exemplo</td>
                            <td class="px-6 py-4 text-gray-700" th:text="'R$ ' + ${#numbers.formatDecimal(leilao.initialPrice, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</td>
                            <td class="px-6 py-4 text-gray-500" th:text="${#temporals.format(leilao.finalTimestamp, 'dd/MM/yyyy HH:mm')}">01/01/2026 00:00</td>
                            <td class="px-6 py-4 text-center whitespace-nowrap">
                                <span th:if="${leilao.status.name() == 'AGUARDANDO'}" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-yellow-100 text-yellow-800" th:text="${leilao.status.descricao}">Aguardando</span>
                                <span th:if="${leilao.status.name() == 'ABERTO'}" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800 animate-pulse" th:text="${leilao.status.descricao}">Aberto</span>
                                <span th:if="${leilao.status.name() == 'ENCERRADO'}" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800" th:text="${leilao.status.descricao}">Encerrado</span>
                            </td>
                            <td class="px-6 py-4 text-center whitespace-nowrap text-sm font-medium">
                                <div class="flex justify-center gap-3">
                                    <button hx-get="/leilao/alterar" 
                                            th:attr="hx-data-id=${leilao.id}"
                                            hx-target="#main" 
                                            class="text-blue-600 hover:text-blue-900 font-semibold transition duration-150">
                                        Editar
                                    </button>
                                    <span class="text-gray-300">|</span>
                                    <button class="text-red-600 hover:text-red-900 font-semibold transition duration-150">
                                        Excluir
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(leiloes)}">
                            <td colspan="6" class="px-6 py-10 text-center text-gray-400 italic">
                                Nenhum leilão cadastrado no momento.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

</body>
</html>
