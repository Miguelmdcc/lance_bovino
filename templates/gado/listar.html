<!DOCTYPE html>
<html lang="pt-BR" layout:decorate="~{layout/layoutpadrao}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Listar Gados</title>
</head>

<body>
    <main layout:fragment="conteudo" id="main" class="flex flex-col align-middle w-full m-10">

        <h1 class="text-xl md:text-2xl font-bold text-gray-800">Gados Pesquisados</h1>

        <h1 th:if="${#lists.isEmpty(gados)}" class="text-lg md:text-xl mt-5 text-gray-500 italic">
            Não foram encontrados gados nessa pesquisa
        </h1>

        <th:block th:fragment="lista">
            <li th:each="gado : ${gados}" 
                class="p-2 hover:bg-gray-100 cursor-pointer list-none text-gray-700 transition duration-150" 
                th:data-value="${gado.codigo}" 
                th:text="${gado.nome}">
                Nome do Gado
            </li>
        </th:block>

    </main>
    </body>

</html>
