<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body th:fragment="modal">
    <div class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 animate-fade-in">
        <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md m-4 flex flex-col">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-lg font-semibold text-gray-800" th:text="${'Dar lance no leilão: ' + leilao.nome}">Dar um lance</h3>
                <button onclick="document.getElementById('modal-container').innerHTML = ''" class="text-gray-400 hover:text-gray-600 font-bold text-xl">&times;</button>
            </div>

            <form th:hx-post="@{/leilao/lance/salvar}" hx-target="#main" hx-swap="outerHTML" class="space-y-4">
                <input type="hidden" name="leilaoCodigo" th:value="${leilao.codigo}" />

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Valor do seu Lance (R$)</label>
                    <input type="number" step="0.01" name="valorLance" required min="0.01"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                           placeholder="0,00"/>
                </div>

                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="document.getElementById('modal-container').innerHTML = ''"
                            class="py-2 px-4 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                        Cancelar
                    </button>
                    <button type="submit" onclick="document.getElementById('modal-container').innerHTML = ''"
                            class="py-2 px-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        Confirmar Lance
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
