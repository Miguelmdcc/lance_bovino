<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org"
  layout:decorate="~{layout/layoutpadrao}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <title>Cadastrar Lote</title>
</head>

<body>
  <!-- conteudo principal -->
  <main layout:fragment="conteudo" th:fragment="formulario" id="main" class="flex flex-col align-middle w-full m-10">

    <form th:hx-post="@{/lote/cadastrar}" th:object="${loteDTOInput}" class="w-1/2 mt-10 ms-16">
      
      <div th:replace="~{components/forms :: inputValidado('Validade', validade, 'data')}"></div>
      <div th:replace="~{components/forms :: inputValidado('Número de Doses', nroDosesDoLote, 'number')}"></div>
      <div th:replace="~{components/forms :: inputValidado('Número de Doses Atual', nroDosesAtual, 'number')}"></div>
      <div th:replace="~{components/forms :: inputBuscavelValidado(
                textoLabel='Vacina',
                nomeAtributo='vacina',
                valorAtributo=${loteDTOInput.vacina != null ? loteDTOInput.vacina.codigo : -1},
                textoAtributo=${loteDTOInput.vacina != null ? loteDTOInput.vacina.nome : 'Selecione uma opção'},
                placeholderBusca='Buscar vacina...',
                urlBusca='/lote/pesquisarvacina'
      )}"></div>
      
      <button type="submit"
        class="mt-7 py-3 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-100 text-blue-800 hover:bg-blue-200 focus:outline-none focus:bg-blue-200 disabled:opacity-50 disabled:pointer-events-none">Cadastrar</button>
    </form>

  </main>
  <!-- !conteudo principal -->

</body>

</html>
