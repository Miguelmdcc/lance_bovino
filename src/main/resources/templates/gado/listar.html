<th:block th:fragment="lista" xmlns:th="http://www.thymeleaf.org">
    <li th:if="${#lists.isEmpty(gados)}" class="p-2 text-gray-500 italic cursor-default pointer-events-none">
        Nenhum gado encontrado.
    </li>

    <li th:each="gado : ${gados}" class="p-2 hover:bg-gray-100 cursor-pointer" 
        th:data-value="${gado.codigo}" 
        th:data-text="${gado.nome}" 
        th:text="${gado.nome}">
    </li>
</th:block>
