<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org" layout:decorate="~{layout/layoutpadrao}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <title>Leilões Ativos</title>
</head>

<body>
  <main layout:fragment="conteudo" th:fragment="lista" id="main" class="flex flex-col align-middle w-full m-10">
    
    <div class="flex justify-between items-center mr-10 ml-10 mb-8 border-b pb-4">
        <h1 class="text-2xl md:text-4xl text-gray-800 font-bold">Leilões Ativos</h1>
        
        <button hx-get="/leilao/ativos" hx-target="#main" hx-swap="outerHTML" 
                class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none">
            <svg class="flex-shrink-0 w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Atualizar Lances
        </button>
    </div>

    <h1 th:if="${#lists.isEmpty(leiloes)}" class="text-2xl text-center mt-10 text-gray-500">Nenhum leilão ativo no momento.</h1>

    <div th:if="${not #lists.isEmpty(leiloes)}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mr-10 ml-10">
      
      <div th:each="leilao : ${leiloes}" class="bg-white border rounded-xl shadow-sm flex flex-col p-5 hover:shadow-md transition duration-300">
        
        <div class="flex justify-between items-start mb-4">
            <h3 class="text-xl font-bold text-gray-800 uppercase" th:text="${leilao.nome}">NOME DO LEILÃO</h3>
            <span class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-green-100 text-green-800">
              <span class="w-1.5 h-1.5 inline-block bg-green-600 rounded-full animate-pulse"></span>
              Ativo
            </span>
        </div>

        <div class="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
            <p class="text-xs text-gray-500 uppercase tracking-wide font-semibold mb-1">Encerra em:</p>
            <p class="text-lg font-bold text-red-600 flex items-center gap-2">
                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span th:text="${#temporals.format(leilao.finalTimestamp, 'dd/MM/yyyy HH:mm')}">00/00/0000 00:00</span>
            </p>
        </div>

        <div class="flex justify-between items-end mb-6 pt-4 border-t border-gray-200">
            <div>
                <p class="text-xs text-gray-500 font-semibold uppercase">Lance Inicial</p>
                <p class="text-sm font-medium text-gray-600" 
                   th:text="|R$ ${#numbers.formatDecimal(leilao.initialPrice, 1, 'POINT', 2, 'COMMA')}|">
                   R$ 0,00
                </p>
            </div>
            <div class="text-right">
                <p class="text-xs font-bold text-gray-500 uppercase">Último Lance</p>
                <p class="text-2xl font-black text-green-600" 
                   th:text="${leilao.ultimoLance != null ? 'R$ ' + #numbers.formatDecimal(leilao.ultimoLance, 1, 'POINT', 2, 'COMMA') : 'Sem lances'}">
                   R$ 0,00
                </p>
            </div>
        </div>

        <a th:href="@{/leilao/sala/{id}(id=${leilao.id})}" 
           class="mt-auto w-full py-3 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-bold rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition">
          Acessar Leilão
        </a>

      </div>

    </div>
  </main>
  </body>
</html>
