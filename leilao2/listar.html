<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.thymeleaf.org" layout:decorate="~{layout/layoutpadrao}" >

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <title>Listar Leilões</title>
</head>

<body>
  <main layout:fragment="conteudo" th:fragment="tabela" id="main" class="flex flex-col align-middle w-full m-10">
    
    <h1 th:if="${pagina.vazia}" class="text-2xl md:text-4xl text-center mt-10">Não foram encontrados leilões</h1>

    <div th:if="${not pagina.vazia}" class="flex flex-col mr-10 ml-10 mt-5">
      <h1 class="text-2xl md:text-4xl text-gray-800 font-bold mb-6">Gerenciar Leilões</h1>
      <div class="overflow-x-auto">
        <div class="min-w-full inline-block align-middle">
          <div class="border rounded-xl overflow-hidden shadow">
            <table class="min-w-full divide-y divide-gray-200">
              <thead>
                <tr>
                  <th:block th:replace="~{components/paginacao :: coluna(${pagina}, 'id', 'Código', '')}"></th:block>
                  <th:block th:replace="~{components/paginacao :: coluna(${pagina}, 'nome', 'Nome', '')}"></th:block>
                  <th:block th:replace="~{components/paginacao :: coluna(${pagina}, 'initialPrice', 'Preço Inicial', '')}"></th:block>
                  <th:block th:replace="~{components/paginacao :: coluna(${pagina}, 'finalTimestamp', 'Encerramento', '')}"></th:block>
                  <th:block th:replace="~{components/paginacao :: coluna(${pagina}, 'status', 'Status', '')}"></th:block>
                  <th scope="col" colspan="2" class="px-6 py-3 text-xs font-medium text-gray-500 uppercase text-center">Ação</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="leilao : ${pagina.conteudo}" class="odd:bg-white even:bg-gray-100 hover:bg-gray-200">
                  <td th:text="${leilao.id}" class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800">1</td>
                  <td th:text="${leilao.nome}" class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">Nome do Leilão</td>
                  
                  <td th:text="${'R$ ' + #numbers.formatDecimal(leilao.initialPrice, 1, 'POINT', 2, 'COMMA')}" class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">R$ 0,00</td>
                  
                  <td th:text="${#temporals.format(leilao.finalTimestamp, 'dd/MM/yyyy HH:mm')}" class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">00/00/0000 00:00</td>
                  
                  <td th:text="${leilao.status.descricao}" class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-800">Aguardando</td>
                  
                  <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                    <a th:hx-get="@{/leilao/alterar/{id}(id=${leilao.id})}" hx-target="#main" class="cursor-pointer text-blue-600 hover:text-blue-500 decoration-2 hover:underline focus:outline-hidden focus:underline">Alterar</a>
                  </td>
                  
                  <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                    <a th:hx-delete="@{/leilao/remover/{id}(id=${leilao.id})}" th:hx-confirm="${'Você vai remover o leilão ' + leilao.nome + '! Nenhuma transação será feita.'}" hx-target="#main" class="cursor-pointer text-red-600 hover:text-red-500 decoration-2 hover:underline focus:outline-hidden focus:underline">Remover</a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          
          <div th:replace="~{components/paginacao :: paginacao(${pagina})}"></div> 
        </div>
      </div>
    </div>
    
  </main>
  </body>

</html>
